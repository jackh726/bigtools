version: 2

build:
  os: "ubuntu-24.04"
  tools:
    # Pin to 3.13: pyo3 0.22 (used by the extension) does not support 3.14 yet,
    # and "3" floats to the newest interpreter available on Read the Docs.
    python: "3.13"
    rust: "latest"
  commands:
    # Cancel building pull requests when they do not change pybigtools.
    #
    # If there are no changes (git diff exits with 0) we force the command to
    # return with 183, a special exit code on Read the Docs that cancels the
    # build immediately.
    - |
      if [ "$READTHEDOCS_VERSION_TYPE" = "external" ] && git diff --quiet origin/master -- pybigtools/;
      then
        exit 183;
      fi
    # Install the docs toolchain and build/install the extension. The API
    # reference is built with Sphinx autodoc, which imports the compiled
    # module, so the Rust extension must be built (hence tools.rust above).
    - pip install uv
    - uv sync --project pybigtools --group docs
    # Build the HTML into Read the Docs' output directory (warnings are errors).
    - uv run --project pybigtools --no-sync sphinx-build -W -b html pybigtools/docs "$READTHEDOCS_OUTPUT/html"
